<!DOCTYPE html>
<html>

<head>
    <title>Document</title>
    <style>
        h1 {
            color: #41644A;
            text-align: center;
        }

        body {
            background-color: #F6F8D5;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
        }

        nav a {
            margin-right: 20px;
            font-size: 25px;
            text-decoration: none;
            color: #333;
        }

        .group {
            display: flex;
            gap: 15px;
        }

        .btn1 {
            background-color: #4F959D;
            font-size: 20px;
            border-radius: 15px;
            color: black;
            padding: 10px 20px;
            border: none;
        }

        .btn2 {
            background-color: #98D2C0;
            font-size: 20px;
            border-radius: 15px;
            color: black;
            padding: 10px 20px;
            border: none;
        }

        .premiernav{
            margin-left: 20%;
        }

        .logo{
            height: 80px;
            width: 100px;
        }

        .image{
            height: 600px;
            width: 600px;
            margin-left: 10%;
        }
        .home {
            display: flex;
            justify-content: space-between;
            align-items: center; 
            padding: 40px 80px;   
        }
        
    </style>
</head>

<body>
    <div class="navbar">
            <img class="logo" src="logo.png">
        <nav class="premiernav">
            <a href="#">Accueil</a>
            <a href="#">About us</a>
            <a href="#">Contact</a>
        </nav>
        <div class="group">
            <button class="btn1">Connexion</button>
            <button class="btn2">Inscription</button>
        </div>
    </div>

<div class="home">
    <img class="image" src="logo.png">

    <h1 style="margin-right: 100px; font-size: 50px;">
        <span style="color: #205781;">We deliver</span>
        <span style="color: #4F959D;">groceries</span>
    </h1>

</div>    
</body>

</html>
